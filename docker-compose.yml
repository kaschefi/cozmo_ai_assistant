services:
  # The PostgreSQL Database Service
  database:
    image: postgres:15-alpine
    container_name: cozmo-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cozmo_memory}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-cozmo_memory}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # The FastAPI Backend Service (Real-time Reload)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: moka-backend:latest
    container_name: cozmo-backend-app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn core.modes.web_api:app --host 0.0.0.0 --port 8000 --reload
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-cozmo_memory}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      database:
        condition: service_healthy

  # The React/Vite Frontend Service (Hot Module Replacement HMR)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: builder
    image: moka-frontend-dev:latest
    container_name: cozmo-frontend-app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npx vite --host 0.0.0.0 --port 5173
    depends_on:
      - backend

# Separate persistent storage volume so your DB memory survives container restarts
volumes:
  postgres_data:
